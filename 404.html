<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Shree Nath Mahato</title>
  <link rel="stylesheet" href="./styles/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 30% 40%, rgba(139,92,246,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 70% 60%, rgba(6,182,212,0.14) 0%, transparent 55%);
      pointer-events: none;
    }
    .error-content { position: relative; max-width: 600px; }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 18vw, 12rem);
      font-weight: 800;
      line-height: 1;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0;
      letter-spacing: -0.04em;
    }
    .error-title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      margin: 0.5rem 0 1rem;
    }
    .error-desc {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <div class="nav-brand">SNM</div>
      <ul class="nav-menu" id="navMenu">
        <li><a href="./index.html" class="nav-link">Home</a></li>
        <li><a href="./about.html" class="nav-link">About</a></li>
        <li><a href="./projects.html" class="nav-link">Projects</a></li>
        <li><a href="./certifications.html" class="nav-link">Certifications</a></li>
        <li><a href="./index.html#contact" class="nav-link">Contact</a></li>
      </ul>
      <div class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <div class="error-page">
    <div class="error-grid"></div>
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">The page you're looking for seems to have wandered off into the data void. Let's get you back on track.</p>
      <div class="error-actions">
        <a href="./index.html" class="btn-primary"><i class="fas fa-home"></i> Go Home</a>
        <a href="./projects.html" class="btn-outline"><i class="fas fa-chart-bar"></i> View Projects</a>
      </div>
    </div>
  </div>

  <script src="./scripts/script.js"></script>
</body>
</html>
